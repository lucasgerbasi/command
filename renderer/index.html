<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <div class="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-wordmark">Command</span>
      <span class="titlebar-sep"></span>
      <span class="titlebar-section" id="tb-section">Dashboard</span>
    </div>
    <div class="titlebar-time" id="titlebar-time"></div>
    <div class="titlebar-controls">
      <button class="tb-btn" id="btn-minimize" title="Minimize">─</button>
      <button class="tb-btn" id="btn-maximize" title="Maximize">□</button>
      <button class="tb-btn tb-close" id="btn-close" title="Close to tray">✕</button>
    </div>
  </div>

<nav class="sidebar-nav">
      <button class="nav-btn active" data-module="dashboard" title="Dashboard"><span class="nav-icon">◈</span><span class="nav-label">Dashboard</span></button>
      <button class="nav-btn" data-module="launcher" title="Launcher"><span class="nav-icon">⚡</span><span class="nav-label">Launcher</span></button>
      <button class="nav-btn" data-module="clipboard" title="Clipboard"><span class="nav-icon">⎘</span><span class="nav-label">Clipboard</span></button>
      <button class="nav-btn" data-module="templates" title="Templates"><span class="nav-icon">⊟</span><span class="nav-label">Templates</span></button>
      <button class="nav-btn" data-module="tasks" title="Tasks"><span class="nav-icon">✓</span><span class="nav-label">Tasks</span></button>
      <button class="nav-btn" data-module="habits" title="Habits"><span class="nav-icon">↻</span><span class="nav-label">Daily Habits</span></button>
      <button class="nav-btn" data-module="notes" title="Notes"><span class="nav-icon">✎</span><span class="nav-label">Notes</span></button>
      <button class="nav-btn" data-module="bookmarks" title="Bookmarks"><span class="nav-icon">◉</span><span class="nav-label">Bookmarks</span></button>
      <button class="nav-btn" data-module="calendar" title="Calendar"><span class="nav-icon">▦</span><span class="nav-label">Calendar</span></button>
      <button class="nav-btn" data-module="weather" title="Weather"><span class="nav-icon">◌</span><span class="nav-label">Weather</span></button>
      <button class="nav-btn" data-module="files" title="Folders"><span class="nav-icon">📁</span><span class="nav-label">Folders</span></button>
      <button class="nav-btn" data-module="clocks" title="Clocks"><span class="nav-icon">◷</span><span class="nav-label">World Clocks</span></button>
      <button class="nav-btn" data-module="timers" title="Timers"><span class="nav-icon">⏱</span><span class="nav-label">Timers</span></button>
      <button class="nav-btn" data-module="pomodoro" title="Pomodoro"><span class="nav-icon">🍅</span><span class="nav-label">Pomodoro</span></button>
      <button class="nav-btn" data-module="reminders" title="Reminders"><span class="nav-icon">◎</span><span class="nav-label">Reminders</span></button>
      <button class="nav-btn" data-module="calculator" title="Calculator"><span class="nav-icon">🧮</span><span class="nav-label">Calculator</span></button>
      <button class="nav-btn" data-module="converter" title="Converter"><span class="nav-icon">⚖</span><span class="nav-label">Converter</span></button>
      <button class="nav-btn" data-module="moods" title="Moods"><span class="nav-icon">🙂</span><span class="nav-label">Mood Tracker</span></button>
      <button class="nav-btn" data-module="sysmon" title="System Monitor"><span class="nav-icon">⊡</span><span class="nav-label">System</span></button>
      <button class="nav-btn" data-module="sync" title="Sync"><span class="nav-icon">⇄</span><span class="nav-label">Sync</span></button>
      <button class="nav-btn" data-module="chronicle" title="Chronicle"><span class="nav-icon">📖</span><span class="nav-label">Chronicle</span></button>
      <button class="nav-btn" data-module="queue" title="Queue"><span class="nav-icon">🎬</span><span class="nav-label">Queue</span></button>
      <button class="nav-btn" data-module="library" title="Library"><span class="nav-icon">📚</span><span class="nav-label">Library</span></button>
      <button class="nav-btn" data-module="random" title="Random"><span class="nav-icon">⚄</span><span class="nav-label">Randomizer</span></button>
    </nav>
    <div class="sidebar-footer" style="display:flex;flex-direction:column;gap:6px">
      <button id="manage-modules-btn" style="background:none;border:1px solid var(--border);color:var(--text-muted);font-size:9px;padding:3px 8px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;font-family:var(--font);transition:color .1s,border-color .1s" title="Enable/disable modules">⊞ Modules</button>
      <button id="sidebar-settings-btn" class="sidebar-settings-btn" title="Theme & Settings">⚙ Settings</button>
      <span class="sidebar-ver" id="app-version">v1.0</span>
    </div>
  </div>

  <main class="content" id="content"></main>

  <div class="toast-container" id="toast-container"></div>

  <div class="launcher-overlay" id="launcher-overlay">
    <div class="launcher-overlay-box">
      <div class="launcher-overlay-prompt">›</div>
      <input class="launcher-overlay-input" id="launcher-overlay-input" placeholder="task · note · remind · calc · timer · find · open · focus · copy · mood · habit · clear · go…" autocomplete="off" spellcheck="false" />
      <span class="launcher-overlay-hint">↵ run · ↑↓ navigate · esc close</span>
    </div>
    <div class="lov-hint-bar" id="lov-hint-bar"></div>
    <div class="launcher-overlay-results" id="launcher-overlay-results"></div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/modules/clipboard.js"></script>
  <script src="js/modules/templates.js"></script>
  <script src="js/modules/launcher.js"></script>
  <script src="js/modules/tasks.js"></script>
  <script src="js/modules/notes.js"></script>
  <script src="js/modules/bookmarks.js"></script>
  <script src="js/modules/calendar.js"></script>
  <script src="js/modules/weather.js"></script>
  <script src="js/modules/sysmon.js"></script>
  <script src="js/modules/files.js"></script>
  <script src="js/modules/clocks.js"></script>
  <script src="js/modules/reminders.js"></script>
  <script src="js/modules/random.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/pomodoro.js"></script>
  <script src="js/modules/calculator.js"></script>
  <script src="js/modules/converter.js"></script>
  <script src="js/modules/habits.js"></script>
  <script src="js/modules/timers.js"></script>
  <script src="js/modules/moods.js"></script>
  <script src="js/modules/sync.js"></script>
  <script src="js/modules/chronicle.js"></script>
  <script src="js/modules/queue.js"></script>
  <script src="js/modules/library.js"></script>
  <script src="js/modules/settings.js"></script>
</body>
</html>
